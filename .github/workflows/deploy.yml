name: build and deploy to Firebase App Distribution
on:
  pull_request:
    branches:
      - Staging
  push:
    branches:
      - Staging

jobs:
  Qaulity_and_test_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Install dependencies
        run: flutter pub get

      # Code Quality Checks
      - name: Flutter Analysis
        run: |
          flutter analyze --fatal-infos --fatal-warnings
          echo "Static analysis passed ✅"

      - name: Dart Format Check
        run: |
          dart format --set-exit-if-changed .
          echo "Code formatting is correct ✅"

      - name: Import Sorter Check
        run: |
          dart pub global activate import_sorter
          dart pub global run import_sorter:main --no-comments --exit-if-changed
          echo "Import sorting is correct ✅"

      - name: Security Analysis
        run: |
          # Check for hardcoded secrets (basic check)
          if grep -r "password\|secret\|key\|token" --include="*.dart" lib/ --exclude-dir=secrets; then
            echo "⚠️ Potential hardcoded secrets found"
            # Don't fail the build, just warn
          fi 
          # Check dependencies for known vulnerabilities
          flutter pub deps --json > deps.json
          echo "✅ Dependency check completed"

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            let comment = `## 🔍 Code Quality Report\n\n`;
            comment += `- ✅ Static analysis passed\n`;
            comment += `- ✅ Code formatting correct\n`;
            comment += `**Build Info:**\n`;
            comment += `- Commit: ${context.sha.substring(0, 7)}\n`;
            comment += `- Branch: ${context.payload.pull_request.head.ref}\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            
  

  build_and_deploy:
    runs-on: ubuntu-latest
    needs: Qaulity_and_test_check
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: set up flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
            ruby-version: "3.3.6"
            bundler-cache: true
            working-directory: android

      - name: Deploy Android app to Firebase via Fastlane
        working-directory: android
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_CLI_TOKEN: ${{ secrets.FIREBASE_CLI_TOKEN }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
            bundle exec fastlane deploy_to_firebase

